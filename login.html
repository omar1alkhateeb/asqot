<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ASQOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sky-blue: #F0F9FF; --primary-orange: #FF8C42; --border: #E2E8F0; }
        body { background: var(--sky-blue); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); outline: none; }
        .btn-orange { width: 100%; background: var(--primary-orange); color: white; padding: 14px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; }
        .btn-outline { width: 100%; border: 1px solid var(--border); background: white; padding: 12px; border-radius: 40px; margin-top: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 style="font-size: 24px; margin-bottom: 10px;">Welcome Back</h1>
        <p style="color: #64748B; margin-bottom: 30px;">Login to track your vitality</p>
        
        <form>
            <div class="input-group"><label>Email</label><input type="email" placeholder="mail@example.com"></div>
            <div class="input-group"><label>Password</label><input type="password" placeholder="********"></div>
            <button type="submit" class="btn-orange">Login</button>
            <div style="margin: 20px 0; color: #CBD5E1;">OR</div>
            <button type="button" class="btn-outline">Login with University SSO</button>
        </form>
        <p style="margin-top: 25px; font-size: 14px;">New here? <a href="signup.html" style="color: var(--primary-orange); font-weight: 700; text-decoration: none;">Create account</a></p>
    </div>
</body>
</html>
